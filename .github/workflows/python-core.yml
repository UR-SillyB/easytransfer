name: python-core

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/python-core.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/python-core.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run e2e demo
        run: python scripts/e2e_demo.py --workdir /tmp/easytransfer-demo-ci

      - name: Build artifacts
        run: python -m pip install build && python -m build
