<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>易传发送端</title>
    <style>
      body { font-family: Arial, sans-serif; width: 360px; padding: 12px; }
      .row { margin-bottom: 10px; }
      label { display: block; font-size: 12px; margin-bottom: 4px; }
      input, button, select { width: 100%; box-sizing: border-box; padding: 6px; }
      #frameCanvas { width: 100%; border: 1px solid #ddd; }
      pre { max-height: 180px; overflow: auto; background: #111; color: #0f0; padding: 8px; font-size: 11px; }
    </style>
  </head>
  <body>
    <h3>易传发送端</h3>
    <div class="row">
      <label for="fileInput">选择文件</label>
      <input id="fileInput" type="file" multiple />
    </div>
    <div class="row">
      <label for="fpsInput">帧率 FPS</label>
      <input id="fpsInput" type="number" min="1" max="60" value="30" />
    </div>
    <div class="row">
      <label for="symbolInput">符号大小（字节）</label>
      <input id="symbolInput" type="number" min="128" max="4096" value="1024" />
    </div>
    <div class="row">
      <label for="redundancyInput">冗余比例</label>
      <input id="redundancyInput" type="number" min="0" max="2" step="0.05" value="0.2" />
    </div>
    <div class="row">
      <button id="prepareBtn">生成码帧</button>
    </div>
    <div class="row">
      <button id="startBtn" disabled>开始播放</button>
    </div>
    <div class="row">
      <button id="stopBtn" disabled>停止</button>
    </div>
    <canvas id="frameCanvas" width="320" height="320"></canvas>
    <pre id="log"></pre>
    <script src="popup.js"></script>
  </body>
  </html>
